<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Prize Visualizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <div id="app"></div>
    <script src="main.js"></script>
    <script>
      var app = Elm.Main.init({
        node: document.getElementById('app'),
        flags: window.location.search
      });
      // Mirror filter/tab/selection state into the URL (without adding history
      // entries) so the current view can be copied and shared as a link.
      app.ports.setQueryString.subscribe(function (queryString) {
        var newUrl = window.location.pathname + queryString + window.location.hash;
        window.history.replaceState(null, '', newUrl);
      });
    </script>
  </body>
</html>
